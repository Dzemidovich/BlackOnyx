<div class="cart-layout">
    <div class="cart-items-section" id="cart-items-list"></div>
    <div class="cart-summary-sidebar">
        <div class="cart-summary-card">
            <h3 id="cart-summary-title" style="font-weight:700;margin-bottom:16px;"></h3>
            <div class="cart-summary-row">
                <span id="cart-items-label"></span>
                <span id="cart-items-count"></span>
            </div>
            <div class="cart-summary-total">
                <span id="cart-total-label"></span>
                <span id="cart-total-amount"></span>
            </div>
            <button class="cart-checkout-btn" onclick="app.checkout()">
                <i class="fas fa-check"></i>
                <span id="cart-checkout-label"></span>
            </button>
        </div>
    </div>
</div>
